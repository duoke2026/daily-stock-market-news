name: Run Daily Stock News

# 配置触发条件：可以设置定时任务，也可以设置手动触发
on:
  schedule:
    # 每天早晨 8点 (UTC 时间 0:00) 自动运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在界面上手动点击运行（方便测试）

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 安装项目依赖（依据你的 requirements.txt）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. 运行你的 Python 脚本
    - name: Run script
      run: python collect_news.py
